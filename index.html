<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE Shine Digital Ticket</title>
    <link rel="icon" href="We-Logo.png" />
    <style>
        :root {
            --primary-color: #4e148c;
            --secondary-color: #00b4d8;
            --dark-bg: #0b0c10;
            --card-bg: #1f2833;
            --text-color: #c5c6c7;
        }

        *, *:before, *:after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 180, 216, 0.2);
            text-align: center;
            max-width: 100%;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }


        .school-logo {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
            color: #95a5a6;
            line-height: 1.5;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            border: 2px solid #45f3ff;
            background: transparent;
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 15px var(--secondary-color);
        }

        button {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 12px 30px;
            margin: 15px 0 5px 0;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        #previewCanvas {
            width: 100% !important;
            height: auto !important;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: block;
        }

        #formContainer, #resultContainer {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="formContainer">
        <img src="ًWe-Logo.png" alt="WE School Logo" class="school-logo">
        <h1>WE Shine Digital Ticket</h1>
        <p>Please enter your full name to generate your official access ticket for the event. (One ticket per device)</p>
        <input type="text" id="studentName" placeholder="Enter your full name..." autocomplete="off">
        <button onclick="generateCard()">Generate Access Pass →</button>
    </div>

    <div class="container" id="resultContainer">
        <h1 style="color: #2ecc71;">Access Granted Successfully!</h1>
        <p>Please present this pass to the gate security to enter the venue. You can also download it below.</p>
        
        <canvas id="previewCanvas"></canvas>
        
        <button id="downloadBtn" style="margin-top: 15px;">Download Pass ↓</button>
    </div>

    <script>
        const canvas = document.getElementById("previewCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = 1920;
        canvas.height = 1080;

        let cardTemplate = new Image();
        cardTemplate.src = 'card.png'; 

        function isLocalStorageAvailable() {
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                return true;
            } catch(e) {
                return false;
            }
        }

        window.onload = function() {
            if (isLocalStorageAvailable()) {
                const savedName = localStorage.getItem("visitor_name");
                const savedTicket = localStorage.getItem("visitor_ticket");

                if (savedName && savedTicket) {
                    document.getElementById("resultContainer").style.display = "block";
                    cardTemplate.onload = function() {
                        drawCard(savedName, savedTicket);
                    };
                    return;
                }
            }
            document.getElementById("formContainer").style.display = "block";
        };

        function generateCard() {
            const nameInput = document.getElementById("studentName").value.trim();
            
            if (nameInput === "") {
                alert("Please enter your name first!");
                return;
            }

            const ticketNumber = "WE-" + Math.floor(100000 + Math.random() * 900000);

            if (isLocalStorageAvailable()) {
                localStorage.setItem("visitor_name", nameInput);
                localStorage.setItem("visitor_ticket", ticketNumber);
            }

            document.getElementById("formContainer").style.display = "none";
            document.getElementById("resultContainer").style.display = "block";

            drawCard(nameInput, ticketNumber);
        }

        function drawCard(name, ticket) {
            ctx.clearRect(0, 0, 1920, 1080);
            ctx.drawImage(cardTemplate, 0, 0, 1920, 1080);

            // 1. Draw Full Name
            ctx.fillStyle = "#000000"; 
            ctx.font = "bold 52px Tahoma"; 
            ctx.textAlign = "center";
            ctx.textBaseline = "middle"; 
            ctx.fillText(name, 1920 / 2, 590); 

            ctx.fillStyle = "#4e148c"; 
            ctx.font = "bold 38px 'Segoe UI', sans-serif";
            ctx.fillText("Ticket No: " + ticket, 1920 / 2, 720); 
            
            document.getElementById("downloadBtn").onclick = function() {
                const imageLink = canvas.toDataURL("image/png");
                const link = document.createElement("a");
                link.download = `WE_GatePass_${ticket}.png`;
                link.href = imageLink;
                link.click();
            };
        }
    </script>
</body>
</html>
